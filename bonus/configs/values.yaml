global:
  edition: ce

  installCertmanager: false

  hosts:
    domain: 46.101.115.185.nip.io
    #externalIP: 127.0.0.1

  ingress:
    configureCertmanager: false
    class: "nginx"

  kas:
    enabled: false

prometheus:
  install: false

grafana:
  enabled: false

gitlab-runner:
  install: false

registry:
  enabled: false

gitlab:
  webservice:
    minReplicas: 1
    maxReplicas: 1
    resources:
      requests:
        memory: 400Mi
        cpu: 200m

  sidekiq:
    resources:
      requests:
        memory: 200Mi
        cpu: 100m

postgresql:
  primary:
    persistence:
      enabled: false
    resources:
      requests:
        memory: 300Mi
        cpu: 100m

redis:
  master:
    persistence:
      enabled: false
    resources:
      requests:
        memory: 100Mi
        cpu: 50m

minio:
  master:
    persistence:
      enabled: false
    resources:
      requests:
        memory: 100Mi
        cpu: 50m
